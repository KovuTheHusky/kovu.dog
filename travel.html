---
layout: default
title: Travel
permalink: /travel
---

<style>
  ::-webkit-scrollbar {
    width: 0 !important;
  }

  .mapboxgl-popup-content img.emoji {
    height: 1em !important;
    position: relative !important;
    top: -2px !important;
    vertical-align: bottom !important;
  }
</style>
<link href="/node_modules/mapbox-gl/dist/mapbox-gl.css" rel="stylesheet" />
<script
  src="/node_modules/mapbox-gl/dist/mapbox-gl.js"
  data-cfasync="false"
></script>
<div
  id="map"
  style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
></div>
<div
  class="position-absolute bottom-0 start-50 translate-middle-x mb-3 z-3 d-flex gap-3"
>
  <div class="d-flex gap-3 bg-dark bg-opacity-75 px-3 py-2 rounded-pill">
    <div class="form-check form-switch">
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="toggle-projection"
        checked
      />
      <label class="form-check-label text-white" for="toggle-projection"
        >Globe</label
      >
    </div>
  </div>
  <div class="d-flex gap-3 bg-dark bg-opacity-75 px-3 py-2 rounded-pill">
    <div class="form-check form-switch">
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="toggle-places"
        checked
      />
      <label class="form-check-label text-white" for="toggle-places"
        >Places</label
      >
    </div>
    <div class="form-check form-switch">
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="toggle-flights"
        checked
      />
      <label class="form-check-label text-white" for="toggle-flights"
        >Flights</label
      >
    </div>
    <div class="form-check form-switch">
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="toggle-cruises"
        checked
      />
      <label class="form-check-label text-white" for="toggle-cruises"
        >Cruises</label
      >
    </div>
  </div>
</div>
<script data-cfasync="false">
  mapboxgl.accessToken =
    "pk.eyJ1Ijoia292dXRoZWh1c2t5IiwiYSI6ImNqOG5mN3djYjE5czkycXJ0dzRnd3ZxMWoifQ.GzioSYbbeQRtheWUd-BVAw";
  var map = new mapboxgl.Map({
    attributionControl: false,
    center: [-74.0059662, 40.7127848],
    container: "map",
    hash: true,
    projection: "globe",
    style: {
      version: 8,
      sources: {
        "mapbox-dark-tiles": {
          type: "raster",
          tiles: [
            `https://api.mapbox.com/styles/v1/mapbox/dark-v11/tiles/{z}/{x}/{y}?access_token=${mapboxgl.accessToken}`,
          ],
          tileSize: 256,
        },
      },
      sprite: "https://{{ site.hostname }}/sprite",
      glyphs: "mapbox://fonts/mapbox/{fontstack}/{range}.pbf",
      layers: [
        {
          id: "mapbox-dark-layer",
          type: "raster",
          source: "mapbox-dark-tiles",
        },
      ],
    },
    zoom: 2,
  });
  map.dragRotate.disable();
  map.touchZoomRotate.disableRotation();
  map.addControl(
    new mapboxgl.AttributionControl({ compact: true }),
    "bottom-right",
  );

  // --- Convert Jekyll YAML into Segmented GeoJSON ---
  const rawCruiseFeatures = [];
  {% for cruise in site.data.cruises %}
    {% if cruise.route %}
      (function() {
        const vessel = "{{ cruise.vessel | escape }}";
        const operator = "{{ cruise.operator | escape }}";
        const route = [
          {% for stop in cruise.route %}
            {
              port: "{{ stop.port | escape }}",
              state: "{{ stop.state | escape }}",
              country: "{{ stop.country | escape }}",
              date: "{{ stop.date }}",
              coordinates: [{{ stop.coordinates[0] }}, {{ stop.coordinates[1] }}],
              flagId: ("{{ stop.country }}" === "US" && "{{ stop.state }}")
                        ? "us-{{ stop.state | downcase }}"
                        : "{{ stop.country | downcase }}"
            }{% unless forloop.last %},{% endunless %}
          {% endfor %}
        ];

        // 1. Generate Individual Ports (Points)
        route.forEach(stop => {
          rawCruiseFeatures.push({
            type: "Feature",
            geometry: { type: "Point", coordinates: stop.coordinates },
            properties: {
              port: stop.port,
              state: stop.state,
              country: stop.country,
              date: stop.date,
              vessel: vessel,
              flagId: stop.flagId
            }
          });
        });

        // 2. Generate Individual Voyage Segments (LineStrings)
        for (let i = 0; i < route.length - 1; i++) {
          const start = route[i];
          const end = route[i + 1];

          let originLng = parseFloat(start.coordinates[0]);
          let destLng = parseFloat(end.coordinates[0]);

          // Anti-meridian handling
          const diff = destLng - originLng;
          if (diff > 180) destLng -= 360;
          else if (diff < -180) destLng += 360;

          rawCruiseFeatures.push({
            type: "Feature",
            geometry: {
              type: "LineString",
              coordinates: [
                [originLng, parseFloat(start.coordinates[1])],
                [destLng, parseFloat(end.coordinates[1])]
              ]
            },
            properties: {
              vessel: vessel,
              operator: operator,
              date: end.date,
              origin_port: start.port,
              destination_port: end.port
            }
          });
        }
      })();
    {% endif %}
  {% endfor %}

  const portStatsPast = new Map();
  const portStatsFuture = new Map();
  const cruiseRouteStatsPast = new Map();
  const cruiseRouteStatsFuture = new Map();

  const todayISO = new Date().toISOString().split("T")[0];

  rawCruiseFeatures.forEach(f => {
    const isFuture = f.properties.date > todayISO;

    if (f.geometry.type === "Point") {
      const key = f.properties.port;
      const targetStats = isFuture ? portStatsFuture : portStatsPast;

      if (!targetStats.has(key)) {
        f.properties = { ...f.properties, count: 0 };
        targetStats.set(key, f);
      }
      targetStats.get(key).properties.count++;

    } else if (f.geometry.type === "LineString") {
      const key = f.properties.vessel + "-" + f.properties.origin_port + "-" + f.properties.destination_port;
      const targetStats = isFuture ? cruiseRouteStatsFuture : cruiseRouteStatsPast;

      if (!targetStats.has(key)) {
        f.properties = { ...f.properties, count: 0 };
        targetStats.set(key, f);
      }
      targetStats.get(key).properties.count++;
    }
  });

  for (const [key, feature] of portStatsFuture.entries()) {
    if (portStatsPast.has(key)) feature.properties.hasPast = true;
  }
  for (const [key, feature] of cruiseRouteStatsFuture.entries()) {
    if (cruiseRouteStatsPast.has(key)) feature.properties.hasPast = true;
  }

  const cruiseGeoJSONPast = {
    type: "FeatureCollection",
    features: [...portStatsPast.values(), ...cruiseRouteStatsPast.values()]
  };

  const cruiseGeoJSONFuture = {
    type: "FeatureCollection",
    features: [...portStatsFuture.values(), ...cruiseRouteStatsFuture.values()]
  };

  async function loadFlightRoutesFromCSV(url) {
    try {
      const response = await fetch(url);
      const csvText = await response.text();
      const routes = [];
      const lines = csvText.trim().split("\n");
      const header = lines[0].split(",");

      const fromIndex = header.indexOf("From");
      const toIndex = header.indexOf("To");
      const canceledIndex = header.indexOf("Canceled");
      const dateIndex = header.indexOf("Date");

      for (let i = 1; i < lines.length; i++) {
        const columns = lines[i].split(",");
        if (
          columns.length >
          Math.max(fromIndex, toIndex, canceledIndex, dateIndex)
        ) {
          const from = columns[fromIndex]?.trim();
          const to = columns[toIndex]?.trim();
          const isCanceled = columns[canceledIndex] === "true";
          const date = columns[dateIndex]?.trim();

          if (from && to && !isCanceled) {
            routes.push({ origin: from, destination: to, date: date });
          }
        }
      }
      return routes;
    } catch (error) {
      console.error("Error loading flight data:", error);
      return [];
    }
  }

  async function getAirportDatabase() {
    const response = await fetch("/airports.json");
    const airports = await response.json();
    return new Map(
      airports.map((airport) => [airport.iata_code, airport]),
    );
  }

  function createRouteFeatures(routes, db) {
    const features = [];
    for (const route of routes) {
      const originData = db.get(route.origin);
      const destData = db.get(route.destination);
      if (!originData || !destData) continue;

      const originCoords = [originData.longitude_deg, originData.latitude_deg];
      const originLng = originCoords[0];
      let destLng = destData.longitude_deg;

      const diff = destLng - originLng;
      if (diff > 180) destLng -= 360;
      else if (diff < -180) destLng += 360;

      features.push({
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: [originCoords, [destLng, destData.latitude_deg]],
        },
        properties: {
          origin: route.origin,
          destination: route.destination,
          count: route.count,
          hasPast: route.hasPast || false,
        },
      });
    }
    return features;
  }

  function createAirportFeatures(airportStatsMap, db) {
    const features = [];
    for (const [code, stats] of airportStatsMap.entries()) {
      const airportData = db.get(code);
      if (airportData) {

        let dynamicFlagId = null;
        if (airportData.iso_country) {
          if (airportData.iso_country === "US" && airportData.iso_region) {
            dynamicFlagId = airportData.iso_region.toLowerCase();
          } else {
            dynamicFlagId = airportData.iso_country.toLowerCase();
          }
        }

        features.push({
          type: "Feature",
          geometry: { type: "Point", coordinates: [airportData.longitude_deg, airportData.latitude_deg] },
          properties: {
            code: code,
            name: airportData.name,
            country: airportData.iso_country,
            flagId: dynamicFlagId,
            count: stats.count,
            isFutureOnly: !stats.hasPast,
          },
        });
      }
    }
    return features;
  }

  map.on("load", async function () {
    const [airportDb, flightRoutes] = await Promise.all([
      getAirportDatabase(),
      loadFlightRoutesFromCSV("/flights.csv"),
    ]);

    // --- 1. Process Flight Data ---
    const routeStatsPast = new Map();
    const routeStatsFuture = new Map();
    const airportStats = new Map();

    flightRoutes.forEach((route) => {
      const routeKey = [route.origin, route.destination].sort().join("-");
      const isFuture = route.date >= todayISO;

      const targetStats = isFuture ? routeStatsFuture : routeStatsPast;
      if (!targetStats.has(routeKey)) {
        targetStats.set(routeKey, {
          origin: route.origin,
          destination: route.destination,
          count: 0,
        });
      }
      targetStats.get(routeKey).count++;

      [route.origin, route.destination].forEach((code) => {
        if (!airportStats.has(code)) {
          airportStats.set(code, { count: 0, hasPast: false });
        }
        const stats = airportStats.get(code);
        stats.count++;

        if (!isFuture) {
          stats.hasPast = true;
        }
      });
    });

    for (const [routeKey, stats] of routeStatsFuture.entries()) {
      stats.hasPast = routeStatsPast.has(routeKey);
    }

    const pastFeatures = createRouteFeatures(Array.from(routeStatsPast.values()), airportDb);
    const futureFeatures = createRouteFeatures(Array.from(routeStatsFuture.values()), airportDb);
    const airportFeatures = createAirportFeatures(airportStats, airportDb);

    // --- 2. Extract Unique Flag IDs & Load SVG Assets ---
    const uniqueFlags = new Set();

    [...cruiseGeoJSONPast.features, ...cruiseGeoJSONFuture.features].forEach(f => {
      if (f.geometry.type === "Point" && f.properties.flagId) {
        uniqueFlags.add(f.properties.flagId);
      }
    });

    airportFeatures.forEach(f => {
      if (f.properties.flagId) {
        uniqueFlags.add(f.properties.flagId);
      }
    });

    const loadPromises = Array.from(uniqueFlags).map(flagId => {
      return new Promise((resolve) => {
        if (!flagId) return resolve();

        let imgUrl = "";

        if (flagId === "us-dc") {
          imgUrl = "https://upload.wikimedia.org/wikipedia/commons/0/03/Flag_of_Washington%2C_D.C.svg";
        } else if (flagId.startsWith("us-")) {
          // US States load via the external CDN
          imgUrl = `https://flagcdn.com/${flagId}.svg`;
        } else {
          // International countries load locally via Bun!
          imgUrl = `/node_modules/circle-flags/flags/${flagId}.svg`;
        }

        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
          if (!map.hasImage('flag-circle-' + flagId)) {
            const size = 32;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const radius = 12;

            ctx.save();
            ctx.beginPath();
            ctx.arc(size/2, size/2, radius, 0, Math.PI * 2);
            ctx.clip();

            // Object-Fit Cover Math (Automatically centers and masks the flags perfectly)
            const targetSize = radius * 2;
            const scale = Math.max(targetSize / img.width, targetSize / img.height);
            const scaledWidth = img.width * scale;
            const scaledHeight = img.height * scale;

            const dx = (size - scaledWidth) / 2;
            const dy = (size - scaledHeight) / 2;

            ctx.drawImage(img, dx, dy, scaledWidth, scaledHeight);
            ctx.restore();

            ctx.beginPath();
            ctx.arc(size/2, size/2, radius, 0, Math.PI * 2);
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "white";
            ctx.stroke();

            const imageData = ctx.getImageData(0, 0, size, size);
            map.addImage('flag-circle-' + flagId, imageData);
          }
          resolve();
        };
        img.onerror = () => resolve();
        img.src = imgUrl;
      });
    });

    await Promise.all(loadPromises);

    // --- 3. Add Sources and Layers ---

    // Places
    map.addSource("places", {
      type: "geojson",
      data: "https://api.{{ site.hostname }}/places.geojson",
    });

    map.addLayer({
      id: "places-dots",
      type: "circle",
      source: "places",
      maxzoom: 12,
      paint: {
        "circle-radius": 2.5,
        "circle-color": "#44d262",
        "circle-stroke-color": "white",
        "circle-stroke-width": 0.3125,
      },
    });

    map.addLayer({
      id: "places-icons",
      type: "symbol",
      source: "places",
      minzoom: 10,
      layout: {
        "icon-image": ["get", "icon"],
        "icon-size": ["interpolate", ["linear"], ["zoom"], 10, 0.08, 11, 0.25, 12, 0.5],
        "icon-allow-overlap": true,
        "icon-ignore-placement": true,
      },
    });

    // Cruises
    map.addSource("cruise-data-past", {
      type: "geojson",
      data: cruiseGeoJSONPast
    });

    map.addSource("cruise-data-future", {
      type: "geojson",
      data: cruiseGeoJSONFuture
    });

    // Cruise Lines Past (Pewter)
    map.addLayer({
      id: "cruise-route-lines-past",
      type: "line",
      source: "cruise-data-past",
      filter: ["==", ["geometry-type"], "LineString"],
      paint: {
        "line-color": "#8c92ac",
        "line-opacity": 1,
        "line-width": ["interpolate", ["linear"], ["get", "count"], 1, 1, 10, 10],
      }
    });

    // Cruise Lines Future (Bronze Solid)
    map.addLayer({
      id: "cruise-route-lines-future-solid",
      type: "line",
      source: "cruise-data-future",
      filter: ["all", ["==", ["geometry-type"], "LineString"], ["!=", ["get", "hasPast"], true]],
      paint: {
        "line-color": "#cd7f32",
        "line-opacity": 1,
        "line-width": ["interpolate", ["linear"], ["get", "count"], 1, 1, 10, 10],
      }
    });

    // Cruise Lines Future (Bronze Dashed)
    map.addLayer({
      id: "cruise-route-lines-future-dashed",
      type: "line",
      source: "cruise-data-future",
      filter: ["all", ["==", ["geometry-type"], "LineString"], ["==", ["get", "hasPast"], true]],
      paint: {
        "line-color": "#cd7f32",
        "line-opacity": 1,
        "line-dasharray": [2, 2],
        "line-width": ["interpolate", ["linear"], ["get", "count"], 1, 1, 10, 10],
      }
    });

    // Base Pewter Cruise Ports
    map.addLayer({
      id: "cruise-ports-past",
      type: "circle",
      source: "cruise-data-past",
      filter: ["==", ["geometry-type"], "Point"],
      paint: {
        "circle-radius": 5,
        "circle-color": "#8c92ac",
        "circle-stroke-color": "white",
        "circle-stroke-width": 1.25
      }
    });

    // Base Bronze Cruise Ports
    map.addLayer({
      id: "cruise-ports-future",
      type: "circle",
      source: "cruise-data-future",
      filter: ["==", ["geometry-type"], "Point"],
      paint: {
        "circle-radius": 5,
        "circle-color": "#cd7f32",
        "circle-stroke-color": "white",
        "circle-stroke-width": 1.25
      }
    });

    // Cruise Port Flags Layer (Past)
    map.addLayer({
      id: "cruise-ports-flags-past",
      type: "symbol",
      source: "cruise-data-past",
      filter: ["==", ["geometry-type"], "Point"],
      layout: {
        "icon-image": ["case", ["has", "flagId"], ["concat", "flag-circle-", ["get", "flagId"]], ""],
        "icon-size": 0.5,
        "icon-allow-overlap": true,
        "icon-ignore-placement": true
      }
    });

    // Cruise Port Flags Layer (Future)
    map.addLayer({
      id: "cruise-ports-flags-future",
      type: "symbol",
      source: "cruise-data-future",
      filter: ["==", ["geometry-type"], "Point"],
      layout: {
        "icon-image": ["case", ["has", "flagId"], ["concat", "flag-circle-", ["get", "flagId"]], ""],
        "icon-size": 0.5,
        "icon-allow-overlap": true,
        "icon-ignore-placement": true
      }
    });

    // Flights
    map.addSource("flight-routes-past", {
      type: "geojson",
      data: { type: "FeatureCollection", features: pastFeatures },
    });

    map.addSource("flight-routes-future", {
      type: "geojson",
      data: { type: "FeatureCollection", features: futureFeatures },
    });

    map.addSource("airport-nodes", {
      type: "geojson",
      data: { type: "FeatureCollection", features: airportFeatures },
    });

    map.addLayer({
      id: "route-lines-past",
      type: "line",
      source: "flight-routes-past",
      paint: {
        "line-color": "#c0c0c0",
        "line-opacity": 1,
        "line-width": ["interpolate", ["linear"], ["get", "count"], 1, 1, 10, 10],
      },
    });

    map.addLayer({
      id: "route-lines-future-solid",
      type: "line",
      source: "flight-routes-future",
      filter: ["!", ["get", "hasPast"]],
      paint: {
        "line-color": "#ffd700",
        "line-opacity": 1,
        "line-width": ["interpolate", ["linear"], ["get", "count"], 1, 1, 10, 10],
      },
    });

    map.addLayer({
      id: "route-lines-future-dashed",
      type: "line",
      source: "flight-routes-future",
      filter: ["get", "hasPast"],
      paint: {
        "line-color": "#ffd700",
        "line-opacity": 1,
        "line-dasharray": [2, 2],
        "line-width": ["interpolate", ["linear"], ["get", "count"], 1, 1, 10, 10],
      },
    });

    // Base Gold/Silver Airport Dots
    map.addLayer({
      id: "airport-points",
      type: "circle",
      source: "airport-nodes",
      paint: {
        "circle-radius": 5,
        "circle-color": ["case", ["get", "isFutureOnly"], "#ffd700", "#c0c0c0"],
        "circle-stroke-color": "white",
        "circle-stroke-width": 1.25,
      },
    });

    // Airport Flags Layer
    map.addLayer({
      id: "airport-points-flags",
      type: "symbol",
      source: "airport-nodes",
      layout: {
        "icon-image": ["case", ["has", "flagId"], ["concat", "flag-circle-", ["get", "flagId"]], ""],
        "icon-size": 0.5,
        "icon-allow-overlap": true,
        "icon-ignore-placement": true
      }
    });
  });

  // Updated Interactive Layers
  const interactiveLayers = [
    "places-dots",
    "places-icons",
    "airport-points",
    "airport-points-flags",
    "route-lines-past",
    "route-lines-future-solid",
    "route-lines-future-dashed",
    "cruise-route-lines-past",
    "cruise-route-lines-future-solid",
    "cruise-route-lines-future-dashed",
    "cruise-ports-past",
    "cruise-ports-future",
    "cruise-ports-flags-past",
    "cruise-ports-flags-future"
  ];

  map.on("click", interactiveLayers, function (e) {
    const feature = e.features[0];
    const layerId = feature.layer.id;
    let html = "";
    let coordinates = e.lngLat;

    if (layerId === "places-dots" || layerId === "places-icons") {
      coordinates = feature.geometry.coordinates;
      html = '<div class="text-center" style="color: #000;">';
      html += '<h6 class="mb-1">' + feature.properties.name + "</h6>";
      if (
        feature.properties.address &&
        feature.properties.name != feature.properties.address
      ) {
        html +=
          '<p class="mb-1" style="line-height: 1.25em;">' +
          JSON.parse(feature.properties.address).join("<br>") +
          "</p>";
      }
      if (feature.properties.id) {
        html +=
          ' <a href="https://foursquare.com/v/' +
          feature.properties.id +
          '" class="rounded-circle" style="width: 40px; height: 40px; padding-top: 10px; display:inline-block; vertical-align:top; text-align:center; background-color: #ffa633;"><img src="/node_modules/simple-icons/icons/swarm.svg" style="filter: invert(1); width: 20px; height: 20px; vertical-align: top;"></a>';
      }
      html +=
        ' <a href="https://maps.apple.com/?sll=' +
        coordinates[1] +
        "," +
        coordinates[0] +
        "&q=" +
        feature.properties.name +
        '" class="rounded-circle" style="width: 40px; height: 40px; padding-top: 10px; display:inline-block; vertical-align:top; text-align:center; background-color: #999999;"><img src="/node_modules/simple-icons/icons/apple.svg" style="filter: invert(1); width: 20px; height: 20px; vertical-align: top;"></a> ';
      html +=
        ' <a href="https://www.google.com/maps/search/?api=1&query=' +
        coordinates[1] +
        "," +
        coordinates[0] +
        '" class="rounded-circle" style="width: 40px; height: 40px; padding-top: 10px; display:inline-block; vertical-align:top; text-align:center; background-color: #4285f4;"><img src="/node_modules/simple-icons/icons/googlemaps.svg" style="filter: invert(1); width: 20px; height: 20px; vertical-align: top;"></a> ';
      html += "</div>";
    } else if (layerId === "airport-points" || layerId === "airport-points-flags") {
      coordinates = feature.geometry.coordinates.slice();
      while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
        coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
      }

      const airportName = feature.properties.name;
      const flagId = feature.properties.flagId;

      let flagImg = "";
      if (flagId) {
        if (flagId === "us-dc") {
          flagImg = `<img src="https://upload.wikimedia.org/wikipedia/commons/0/03/Flag_of_Washington%2C_D.C.svg" style="height: 1em; width: 1em; object-fit: cover; border-radius: 50%; position: relative; top: -2px; vertical-align: bottom; margin-left: 4px;">`;
        } else if (flagId.startsWith("us-")) {
          flagImg = `<img src="https://flagcdn.com/${flagId}.svg" style="height: 1em; width: 1em; object-fit: cover; border-radius: 50%; position: relative; top: -2px; vertical-align: bottom; margin-left: 4px;">`;
        } else {
          flagImg = `<img src="/node_modules/circle-flags/flags/${flagId}.svg" style="height: 1em; width: 1em; object-fit: cover; border-radius: 50%; position: relative; top: -2px; vertical-align: bottom; margin-left: 4px;">`;
        }
      }

      html = `
        <div class="text-center" style="color: #000;">
          <h6 class="mb-0">${airportName} ${flagImg}</h6>
          <p class="m-0">${feature.properties.count} ${feature.properties.count === 1 ? 'visit' : 'visits'}</p>
        </div>`;
    } else if (layerId.startsWith("route-lines")) {
      const type = layerId.includes("future") ? "upcoming" : "past";
      html = `
        <div class="text-center" style="color: #000;">
          <h6 class="mb-0">${feature.properties.origin} ↔ ${feature.properties.destination}</h6>
          <p class="m-0">${feature.properties.count} ${type} ${feature.properties.count === 1 ? 'flight' : 'flights'}</p>
        </div>`;
    } else if (layerId.startsWith("cruise-ports")) {
      coordinates = feature.geometry.coordinates.slice();
      while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
        coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
      }

      const portName = feature.properties.port;
      const flagId = feature.properties.flagId;
      const count = feature.properties.count;

      let flagImg = "";
      if (flagId) {
        if (flagId === "us-dc") {
          flagImg = `<img src="https://upload.wikimedia.org/wikipedia/commons/0/03/Flag_of_Washington%2C_D.C.svg" style="height: 1em; width: 1em; object-fit: cover; border-radius: 50%; position: relative; top: -2px; vertical-align: bottom; margin-left: 4px;">`;
        } else if (flagId.startsWith("us-")) {
          flagImg = `<img src="https://flagcdn.com/${flagId}.svg" style="height: 1em; width: 1em; object-fit: cover; border-radius: 50%; position: relative; top: -2px; vertical-align: bottom; margin-left: 4px;">`;
        } else {
          flagImg = `<img src="/node_modules/circle-flags/flags/${flagId}.svg" style="height: 1em; width: 1em; object-fit: cover; border-radius: 50%; position: relative; top: -2px; vertical-align: bottom; margin-left: 4px;">`;
        }
      }

      html = `
        <div class="text-center" style="color: #000;">
          <h6 class="mb-0">${portName} ${flagImg}</h6>
          <p class="m-0">${count} ${count === 1 ? 'visit' : 'visits'}</p>
        </div>`;
    } else if (layerId.startsWith("cruise-route-lines")) {
      const count = feature.properties.count;
      const type = layerId.includes("future") ? "upcoming" : "past";
      html = `
        <div class="text-center" style="color: #000;">
          <h6 class="mb-0">${feature.properties.origin_port} ↔ ${feature.properties.destination_port}</h6>
          <p class="m-0">${count} ${type} ${count === 1 ? 'voyage' : 'voyages'}</p>
        </div>`;
    }

    const popup = new mapboxgl.Popup({ closeButton: false })
      .setLngLat(coordinates)
      .setHTML(html)
      .addTo(map);

    if (typeof twemoji !== 'undefined') {
      twemoji.parse(popup.getElement());
    }
  });

  map.on("mouseenter", interactiveLayers, function () {
    map.getCanvas().style.cursor = "pointer";
  });

  map.on("mouseleave", interactiveLayers, function () {
    map.getCanvas().style.cursor = "";
  });

  document.getElementById("toggle-places").addEventListener("change", (e) => {
    const visibility = e.target.checked ? "visible" : "none";
    if (map.getLayer("places-dots")) map.setLayoutProperty("places-dots", "visibility", visibility);
    if (map.getLayer("places-icons")) map.setLayoutProperty("places-icons", "visibility", visibility);
  });

  document.getElementById("toggle-flights").addEventListener("change", (e) => {
    const visibility = e.target.checked ? "visible" : "none";
    if (map.getLayer("route-lines-past")) map.setLayoutProperty("route-lines-past", "visibility", visibility);
    if (map.getLayer("route-lines-future-solid")) map.setLayoutProperty("route-lines-future-solid", "visibility", visibility);
    if (map.getLayer("route-lines-future-dashed")) map.setLayoutProperty("route-lines-future-dashed", "visibility", visibility);
    if (map.getLayer("airport-points")) map.setLayoutProperty("airport-points", "visibility", visibility);
    if (map.getLayer("airport-points-flags")) map.setLayoutProperty("airport-points-flags", "visibility", visibility);
  });

  document.getElementById("toggle-cruises").addEventListener("change", (e) => {
    const visibility = e.target.checked ? "visible" : "none";

    const layers = [
      "cruise-route-lines-past",
      "cruise-route-lines-future-solid",
      "cruise-route-lines-future-dashed",
      "cruise-ports-past",
      "cruise-ports-future",
      "cruise-ports-flags-past",
      "cruise-ports-flags-future"
    ];

    layers.forEach(layer => {
      if (map.getLayer(layer)) map.setLayoutProperty(layer, "visibility", visibility);
    });
  });

  document
    .getElementById("toggle-projection")
    .addEventListener("change", (e) => {
      const projection = e.target.checked ? "globe" : "mercator";
      map.setProjection(projection);
    });
</script>
